<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vorks Pro• Server Status</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --primary: #251a3c;
        --cream: #0f0a1a;
        --dark: #0c0815;
        --accent: #a89ac9;
        --accent-light: rgba(168, 154, 201, 0.2);
        --text: #e2e8f0;
        --muted: rgba(226, 232, 240, 0.6);
        --ok: #22c55e;
        --border: rgba(168, 154, 201, 0.2);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Plus Jakarta Sans", system-ui, sans-serif;
        background: var(--cream);
        color: var(--text);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        position: relative;
        max-width: 420px;
        width: 100%;
        padding: 48px 40px;
        background: linear-gradient(
          180deg,
          rgba(37, 26, 60, 0.6) 0%,
          rgba(15, 10, 26, 0.9) 100%
        );
        border: 1px solid var(--border);
        border-radius: 24px;
        box-shadow:
          0 24px 60px rgba(0, 0, 0, 0.4),
          0 0 0 1px rgba(168, 154, 201, 0.08);
        text-align: center;
      }

      .card::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, var(--primary), var(--accent));
        border-radius: 24px 24px 0 0;
      }

      .status-dots {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-bottom: 24px;
      }

      .dot {
        width: 10px;
        height: 10px;
        background: var(--ok);
        border-radius: 50%;
        animation: pulse 1.4s ease-in-out infinite;
        box-shadow: 0 0 12px var(--ok);
      }

      .dot:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dot:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 0.6;
          transform: scale(0.9);
        }
        50% {
          opacity: 1;
          transform: scale(1.15);
        }
      }

      h1 {
        font-size: 1.75rem;
        font-weight: 700;
        margin: 0 0 12px;
        letter-spacing: -0.02em;
        color: var(--text);
      }

      .subtitle {
        color: var(--muted);
        font-size: 0.95rem;
        margin: 0 0 20px;
        line-height: 1.5;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 16px;
        background: var(--accent-light);
        border: 1px solid rgba(168, 154, 201, 0.35);
        border-radius: 999px;
        font-size: 0.875rem;
        font-weight: 600;
        color: var(--accent);
      }

      .badge-dot {
        width: 6px;
        height: 6px;
        background: var(--ok);
        border-radius: 50%;
        animation: pulse 1.4s ease-in-out infinite;
      }

      footer {
        margin-top: 32px;
        padding-top: 20px;
        border-top: 1px solid var(--border);
        font-size: 0.8rem;
        color: var(--muted);
      }

      footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }

      footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="status-dots" aria-hidden="true">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </div>
      <h1>Server is running</h1>
      <p class="subtitle">
        Vorks ProAPI is operational and ready to accept requests.
      </p>
      <div class="badge">
        <span class="badge-dot"></span>
        <span>Operational</span>
      </div>
      <footer>
        <a href="https://www.vorkspro.com" target="_blank" rel="noopener"
          >Vorks Pro</a
        >
        © 2025
      </footer>
    </div>
  </body>
</html>
